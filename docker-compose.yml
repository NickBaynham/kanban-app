services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kanban:kanban@db:5432/kanbandb
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=kanban
      - POSTGRES_PASSWORD=kanban
      - POSTGRES_DB=kanbandb
    volumes:
      - kanban_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanbandb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  kanban_pgdata:
